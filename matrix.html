<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrice Servizi — 4D Sistemi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────────── -->
<header class="topbar">
  <span class="topbar-logo">4D Sistemi — Matrice Servizi</span>
  <div class="topbar-right">
    <span class="topbar-name" id="top-name"></span>
    <span class="badge" id="top-badge"></span>
    <a id="admin-link" href="admin.html" class="btn btn-secondary btn-sm hidden">Pannello Admin</a>
    <button class="btn-link" onclick="logout()">Esci</button>
  </div>
</header>

<!-- ── Legend ─────────────────────────────────────────────── -->
<div style="display:flex;gap:16px;padding:1rem 1.5rem 0;flex-wrap:wrap;font-size:12px;color:var(--muted)">
  <span>Settori:</span>
  <span style="color:var(--sec-color)">● Security</span>
  <span style="color:var(--con-color)">● Continuity</span>
  <span style="color:var(--wor-color)">● Workplace</span>
  <span style="color:var(--inf-color)">● Infrastructure</span>
  <span style="color:var(--man-color)">● Management</span>
  <span style="margin-left:8px">Copertura:</span>
  <span style="color:var(--full)">● Piena</span>
  <span style="color:var(--partial)">● Parziale</span>
  <span style="color:var(--gap)">● Gap</span>
</div>

<!-- ── Matrix ─────────────────────────────────────────────── -->
<div class="matrix-wrap">
  <table class="matrix-table" id="matrix-table">
    <thead id="matrix-head"></thead>
    <tbody id="matrix-body"></tbody>
  </table>
</div>

<!-- ── Detail panel ───────────────────────────────────────── -->
<div id="detail-panel" class="detail-panel hidden">
  <div class="detail-header">
    <span class="detail-sector-badge" id="d-sector-badge"></span>
    <span class="detail-title" id="d-title"></span>
    <span class="detail-cov" id="d-cov-badge"></span>
  </div>
  <div class="items-grid" id="d-items"></div>
  <div class="detail-actions">
    <button id="d-suggest-btn" class="btn btn-primary btn-sm" onclick="openSuggestModal()">
      + Proponi modifica
    </button>
    <button class="btn btn-secondary btn-sm" onclick="closeDetail()">Chiudi</button>
  </div>
</div>

<!-- ── My suggestions ─────────────────────────────────────── -->
<div class="suggestions-section">
  <div class="section-title" id="my-sug-title" style="display:none">I miei suggerimenti</div>
  <div id="my-suggestions"></div>
</div>

<!-- ── Suggestion Modal ───────────────────────────────────── -->
<div id="suggest-modal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
  <div class="modal-box">
    <div class="modal-title">Proponi una modifica</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:1rem" id="modal-cell-desc"></p>

    <div class="form-group">
      <label>Tipo di suggerimento</label>
      <select id="sug-type" onchange="onTypeChange()">
        <option value="add_item">Aggiungi un servizio/prodotto</option>
        <option value="edit_item">Modifica un servizio/prodotto esistente</option>
        <option value="delete_item">Elimina un servizio/prodotto</option>
        <option value="change_coverage">Modifica la copertura</option>
        <option value="change_label">Modifica il titolo della cella</option>
        <option value="general_note">Nota generale</option>
      </select>
    </div>

    <!-- add_item fields -->
    <div id="f-add_item">
      <div class="form-group">
        <label>Nome servizio / prodotto</label>
        <input type="text" id="sug-item-name" placeholder="es. Acronis Cyber Backup">
      </div>
      <div class="form-group">
        <label>Descrizione breve</label>
        <input type="text" id="sug-item-desc" placeholder="es. Backup cloud per PMI con deduplicazione">
      </div>
    </div>

    <!-- edit_item fields -->
    <div id="f-edit_item" class="hidden">
      <div class="form-group">
        <label>Seleziona l'elemento da modificare</label>
        <select id="sug-edit-idx" onchange="onEditItemSelect()">
          <option value="">— scegli —</option>
        </select>
      </div>
      <div id="edit-item-fields" class="hidden">
        <p style="font-size:11px;color:var(--muted);margin-bottom:10px">
          Lascia vuoto un campo per non modificarlo.
        </p>
        <div class="form-group">
          <label>Nuovo nome <span style="color:var(--muted);font-weight:400">(attuale: <span id="edit-current-name"></span>)</span></label>
          <input type="text" id="sug-edit-name" placeholder="lascia vuoto per non cambiare">
        </div>
        <div class="form-group">
          <label>Nuova descrizione <span style="color:var(--muted);font-weight:400">(attuale: <span id="edit-current-desc"></span>)</span></label>
          <input type="text" id="sug-edit-desc" placeholder="lascia vuoto per non cambiare">
        </div>
        <div class="form-group">
          <label>Motivazione</label>
          <textarea id="sug-edit-reason" placeholder="Perché proponi questa modifica?"></textarea>
        </div>
      </div>
    </div>

    <!-- delete_item fields -->
    <div id="f-delete_item" class="hidden">
      <div class="form-group">
        <label>Seleziona l'elemento da eliminare</label>
        <select id="sug-delete-idx">
          <option value="">— scegli —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Motivazione</label>
        <textarea id="sug-delete-reason" placeholder="Perché proponi di eliminare questo elemento?"></textarea>
      </div>
    </div>

    <!-- change_coverage fields -->
    <div id="f-change_coverage" class="hidden">
      <div class="form-group">
        <label>Nuova copertura proposta</label>
        <select id="sug-cov">
          <option value="full">Piena (abbiamo tutto)</option>
          <option value="partial">Parziale (manca qualcosa)</option>
          <option value="gap">Gap (non copriamo)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Motivazione</label>
        <textarea id="sug-cov-reason" placeholder="Perché proponi questo cambiamento?"></textarea>
      </div>
    </div>

    <!-- change_label fields -->
    <div id="f-change_label" class="hidden">
      <div class="form-group">
        <label>Nuovo titolo proposto</label>
        <input type="text" id="sug-label-new" placeholder="es. Backup & Disaster Recovery">
      </div>
      <div class="form-group">
        <label>Motivazione</label>
        <textarea id="sug-label-reason" placeholder="Perché proponi questo cambiamento?"></textarea>
      </div>
    </div>

    <!-- general_note fields -->
    <div id="f-general_note" class="hidden">
      <div class="form-group">
        <label>La tua nota</label>
        <textarea id="sug-note" placeholder="Scrivi qui il tuo suggerimento..."></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeSuggestModal()">Annulla</button>
      <button class="btn btn-primary" id="modal-submit-btn" onclick="submitSuggestion()">Invia suggerimento</button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const SECTORS = [
  { id:'sec', label:'Security',       sub:'Protezione dalle minacce esterne',          color:'var(--sec-color)', bg:'var(--sec-bg)' },
  { id:'con', label:'Continuity',     sub:'Accessibilità ai dati garantita',           color:'var(--con-color)', bg:'var(--con-bg)' },
  { id:'wor', label:'Workplace',      sub:'Strumenti per gli utenti',                  color:'var(--wor-color)', bg:'var(--wor-bg)' },
  { id:'inf', label:'Infrastructure', sub:'Infrastrutture di collegamento e calcolo',  color:'var(--inf-color)', bg:'var(--inf-bg)' },
  { id:'man', label:'Management',     sub:'Sistemi gestionali',                        color:'var(--man-color)', bg:'var(--man-bg)' },
]
const ACTIVITIES = ['Consulenza','Progettazione','Fornitura / Produzione','Installazione','Manutenzione']
const COV_COLORS = { full:'var(--full)', partial:'var(--partial)', gap:'var(--gap)' }
const COV_LABELS = { full:'Copertura piena', partial:'Copertura parziale', gap:'Gap' }

let cells = {}
let currentCell = null
let currentUser = null
let currentProfile = null
let cardIndex = {}   // chiave: "cell_id:item_index" → card id

// ── Fatturato DB (righe-fatture-4d-23-24-25) ─────────────────
const FATTURE_URL = 'https://pjyrjcdnmxthpwxpywip.supabase.co'
const FATTURE_KEY = 'sb_publishable_iqrW_m5rY9_NX8C3_NPjNA_gXGBXBLt'
const sbFat = supabase.createClient(FATTURE_URL, FATTURE_KEY)

let _cellFatt  = {}  // cell_id  → { importo: €tot, count: n_righe }
let _itemFatt  = {}  // codice_4dm → { importo: €tot, count: n_righe }

// Ricava il codice_4dm da cell_id + item_index senza query a catalogo
// es. "sec-0", 0 → "A1a"   |   "inf-3", 2 → "D4c"
function getCodice4dm(cell_id, item_index) {
  const [sectorId, actIdxStr] = cell_id.split('-')
  const actIdx   = parseInt(actIdxStr)
  const rowNum   = ['sec','con','wor','inf','man'].indexOf(sectorId) + 1
  const colLetter = String.fromCharCode('A'.charCodeAt(0) + actIdx)
  const itemLetter = String.fromCharCode('a'.charCodeAt(0) + item_index)
  return `${colLetter}${rowNum}${itemLetter}`
}

// Spessore bordo: log₂(count+1), min 0px, max 10px
function borderThickness(count) {
  return Math.min(10, Math.log2(count + 1))
}

// Colore bordo: bianco→rosso basato sulla distanza dalla media
// ratio = importo / (2 * media) → capped a [0,1]
// 0 = bianco, media = rosa, 2×media = rosso pieno
function borderColor(importo, mean) {
  if (mean === 0) return 'rgb(255,255,255)'
  const ratio = Math.min(1, importo / (mean * 2))
  const g = Math.round(255 * (1 - ratio))
  return `rgb(255,${g},${g})`
}

// Applica box-shadow ai .matrix-cell (cards della matrice)
function applyMatrixCellBorders() {
  for (let actIdx = 0; actIdx < 5; actIdx++) {
    // Media della colonna (stesso actIdx = stessa attività)
    const vals = SECTORS.map(s => (_cellFatt[`${s.id}-${actIdx}`]?.importo || 0))
    const nonZero = vals.filter(v => v > 0)
    const mean = nonZero.length ? nonZero.reduce((a, b) => a + b, 0) / nonZero.length : 0

    SECTORS.forEach(s => {
      const id  = `${s.id}-${actIdx}`
      const el  = document.getElementById(`mc-${id}`)
      if (!el) return
      const d   = _cellFatt[id] || { importo: 0, count: 0 }
      const px  = borderThickness(d.count)
      const col = borderColor(d.importo, mean)
      el.style.boxShadow = px > 0 ? `0 0 0 ${px.toFixed(1)}px ${col}` : 'none'
    })
  }
}

// Applica box-shadow agli .item-card del pannello dettaglio
function applyItemCardBorders(cell_id) {
  const cell = cells[cell_id]
  if (!cell) return

  // Media degli item nella stessa cella
  const vals = (cell.items || []).map((_, idx) => {
    const cod = getCodice4dm(cell_id, idx)
    return _itemFatt[cod]?.importo || 0
  })
  const nonZero = vals.filter(v => v > 0)
  const mean = nonZero.length ? nonZero.reduce((a, b) => a + b, 0) / nonZero.length : 0

  cell.items.forEach((_, idx) => {
    const el  = document.getElementById(`ic-${cell_id}-${idx}`)
    if (!el) return
    const cod = getCodice4dm(cell_id, idx)
    const d   = _itemFatt[cod] || { importo: 0, count: 0 }
    const px  = borderThickness(d.count)
    const col = borderColor(d.importo, mean)
    el.style.boxShadow = px > 0 ? `0 0 0 ${px.toFixed(1)}px ${col}` : 'none'
    // Tooltip con i numeri
    el.title = d.count > 0
      ? `Fatturato: €${d.importo.toLocaleString('it-IT', {minimumFractionDigits:0})} · ${d.count} righe`
      : 'Nessun fatturato collegato'
  })
}

// Carica dati da righe_fatture e aggrega per cella/item
async function loadFatturatoData() {
  try {
    // 1. Mapping codice_articolo → codice_4dm (tabella piccola, una sola fetch)
    const { data: mapping, error: mapErr } = await sbFat
      .from('mapping_articoli_4dm')
      .select('codice_articolo,codice_4dm')
    if (mapErr || !mapping) return

    const artTo4dm = {}
    mapping.forEach(m => { artTo4dm[m.codice_articolo] = m.codice_4dm })

    // 2. Righe fatture: fetch paginata (chunk da 1000)
    let allRighe = [], from = 0
    while (true) {
      const { data: chunk } = await sbFat
        .from('righe_fatture')
        .select('codice_articolo,importo')
        .range(from, from + 999)
      if (!chunk || chunk.length === 0) break
      allRighe = allRighe.concat(chunk)
      if (chunk.length < 1000) break
      from += 1000
    }

    // 3. Aggrega per codice_4dm (item level)
    const itemAgg = {}
    allRighe.forEach(r => {
      const cod = artTo4dm[r.codice_articolo]
      if (!cod) return
      if (!itemAgg[cod]) itemAgg[cod] = { importo: 0, count: 0 }
      itemAgg[cod].importo += (Number(r.importo) || 0)
      itemAgg[cod].count  += 1
    })
    _itemFatt = itemAgg

    // 4. Aggrega per cell_id (cell level)
    const cellAgg = {}
    Object.entries(itemAgg).forEach(([cod, d]) => {
      // Ricava cell_id dal codice: prima lettera=col, seconda cifra=riga
      const colIdx  = cod.charCodeAt(0) - 'A'.charCodeAt(0)
      const rowIdx  = parseInt(cod[1]) - 1
      const prefix  = ['sec','con','wor','inf','man'][rowIdx]
      const cell_id = `${prefix}-${colIdx}`
      if (!cellAgg[cell_id]) cellAgg[cell_id] = { importo: 0, count: 0 }
      cellAgg[cell_id].importo += d.importo
      cellAgg[cell_id].count  += d.count
    })
    _cellFatt = cellAgg

    // 5. Applica ai .matrix-cell già renderizzati
    applyMatrixCellBorders()

  } catch(e) {
    console.warn('Fatturato non caricato:', e)
  }
}

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) return window.location.href = 'index.html'
  currentUser = session.user

  // load profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single()
  currentProfile = profile

  // topbar
  document.getElementById('top-name').textContent = profile.full_name || profile.email
  const badge = document.getElementById('top-badge')
  badge.textContent = profile.role
  badge.className = 'badge badge-' + (profile.role === 'admin' ? 'admin' : profile.role === 'viewer' ? 'viewer' : 'contrib')
  if (profile.role === 'admin') document.getElementById('admin-link').classList.remove('hidden')
  if (profile.role === 'viewer') document.getElementById('d-suggest-btn').style.display = 'none'

  // load matrix cells
  const { data: dbCells } = await sb.from('matrix_cells').select('*')
  if (dbCells) dbCells.forEach(c => cells[c.id] = c)

  // load catalog cards index
  const { data: dbCards } = await sb.from('catalog_cards')
    .select('id, cell_id, item_index').eq('published', true)
  if (dbCards) dbCards.forEach(c => { cardIndex[`${c.cell_id}:${c.item_index}`] = c.id })

  renderMatrix()
  loadMySuggestions()
  loadFatturatoData()  // bordi fatturato (asincrono, non blocca la UI)
}

function renderMatrix() {
  // head
  let head = '<tr><th class="sector-th">Settore</th>'
  ACTIVITIES.forEach(a => head += `<th>${a}</th>`)
  head += '</tr>'
  document.getElementById('matrix-head').innerHTML = head

  // body
  let body = ''
  SECTORS.forEach(s => {
    body += `<tr>
      <th class="sector-th" style="color:${s.color}">
        ${s.label}<br>
        <span style="font-size:10px;font-weight:400;color:var(--muted)">${s.sub}</span>
      </th>`
    for (let i = 0; i < 5; i++) {
      const id = `${s.id}-${i}`
      const cell = cells[id]
      if (!cell) { body += '<td></td>'; continue }
      const covColor = COV_COLORS[cell.coverage]
      body += `<td>
        <div class="matrix-cell" id="mc-${id}"
             style="background:${s.bg}"
             onclick="showDetail('${id}')">
          <div class="cell-label" style="color:${s.color}">${cell.label}</div>
          <div class="cell-dots">
            ${cell.items.slice(0,4).map(() =>
              `<div class="cell-dot" style="background:${s.color}"></div>`).join('')}
            ${cell.items.length > 4 ? `<span style="font-size:10px;color:${s.color}">+${cell.items.length-4}</span>` : ''}
          </div>
          <div class="cell-cov">
            <div class="cov-dot" style="background:${covColor}"></div>
            <span class="cov-text">${COV_LABELS[cell.coverage]}</span>
          </div>
        </div>
      </td>`
    }
    body += '</tr>'
  })
  document.getElementById('matrix-body').innerHTML = body
}

function showDetail(id) {
  // deactivate previous
  if (currentCell) document.getElementById('mc-' + currentCell)?.classList.remove('active')
  currentCell = id
  document.getElementById('mc-' + id)?.classList.add('active')

  const cell = cells[id]
  const sector = SECTORS.find(s => id.startsWith(s.id))
  const actIdx = parseInt(id.split('-')[1])

  // sector badge
  const sb_el = document.getElementById('d-sector-badge')
  sb_el.textContent = sector.label
  sb_el.style.background = sector.bg
  sb_el.style.color = sector.color

  document.getElementById('d-title').textContent = ACTIVITIES[actIdx] + ' — ' + cell.label

  const cov = document.getElementById('d-cov-badge')
  cov.textContent = COV_LABELS[cell.coverage]
  cov.style.background = cell.coverage==='full'?'#EAF3DE':cell.coverage==='partial'?'#FFF3CD':'#FCEBEB'
  cov.style.color = cell.coverage==='full'?'#3B6D11':cell.coverage==='partial'?'#856404':'#A32D2D'

  document.getElementById('d-items').innerHTML = cell.items.map((it, idx) => {
    const cardKey = `${id}:${idx}`
    const cardLink = cardIndex[cardKey]
      ? `<a href="scheda.html?id=${cardIndex[cardKey]}" target="_blank"
           style="font-size:10px;color:#185FA5;text-decoration:none;
                  display:inline-block;margin-top:4px">
           📄 Scheda 4DM
         </a>`
      : ''
    return `<div class="item-card" id="ic-${id}-${idx}">
      <div class="item-name">${it.n}</div>
      <div class="item-desc">${it.d}</div>
      ${cardLink}
    </div>`
  }).join('')

  document.getElementById('detail-panel').classList.remove('hidden')
  document.getElementById('detail-panel').scrollIntoView({ behavior:'smooth', block:'nearest' })

  // Bordi fatturato sulle item-card (se i dati sono già caricati)
  applyItemCardBorders(id)
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden')
  if (currentCell) document.getElementById('mc-' + currentCell)?.classList.remove('active')
  currentCell = null
}

// ── Suggestion modal ─────────────────────────────────────────

function openSuggestModal() {
  if (!currentCell) return
  const cell = cells[currentCell]
  const sector = SECTORS.find(s => currentCell.startsWith(s.id))
  const actIdx = parseInt(currentCell.split('-')[1])
  document.getElementById('modal-cell-desc').textContent =
    `Cella: ${sector.label} × ${ACTIVITIES[actIdx]} — "${cell.label}"`

  // Popola i dropdown degli elementi esistenti
  const items = cell.items || []
  const makeOptions = () => `<option value="">— scegli —</option>` +
    items.map((it, i) => `<option value="${i}">${it.n}${it.d ? ' — ' + it.d : ''}</option>`).join('')

  document.getElementById('sug-edit-idx').innerHTML = makeOptions()
  document.getElementById('sug-delete-idx').innerHTML = makeOptions()
  document.getElementById('edit-item-fields').classList.add('hidden')

  document.getElementById('suggest-modal').classList.remove('hidden')
}

function closeSuggestModal() {
  document.getElementById('suggest-modal').classList.add('hidden')
  resetModal()
}

function closeModalOnOverlay(e) {
  if (e.target.id === 'suggest-modal') closeSuggestModal()
}

function onTypeChange() {
  const t = document.getElementById('sug-type').value
  ;['add_item','edit_item','delete_item','change_coverage','change_label','general_note'].forEach(type => {
    document.getElementById('f-' + type).classList.toggle('hidden', type !== t)
  })
}

function onEditItemSelect() {
  const idx = document.getElementById('sug-edit-idx').value
  const fieldsDiv = document.getElementById('edit-item-fields')
  if (idx === '') { fieldsDiv.classList.add('hidden'); return }

  const item = (cells[currentCell]?.items || [])[parseInt(idx)]
  if (!item) return
  document.getElementById('edit-current-name').textContent = item.n || '—'
  document.getElementById('edit-current-desc').textContent = item.d || '—'
  document.getElementById('sug-edit-name').value = ''
  document.getElementById('sug-edit-desc').value = ''
  document.getElementById('sug-edit-reason').value = ''
  fieldsDiv.classList.remove('hidden')
}

function resetModal() {
  document.getElementById('sug-type').value = 'add_item'
  onTypeChange()
  ;['sug-item-name','sug-item-desc','sug-cov-reason','sug-label-new',
    'sug-label-reason','sug-note','sug-edit-reason','sug-delete-reason',
    'sug-edit-name','sug-edit-desc'].forEach(id => {
    const el = document.getElementById(id)
    if (el) el.value = ''
  })
  document.getElementById('sug-cov').value = 'full'
  document.getElementById('sug-edit-idx').value = ''
  document.getElementById('sug-delete-idx').value = ''
  document.getElementById('edit-item-fields').classList.add('hidden')
}

async function submitSuggestion() {
  const type = document.getElementById('sug-type').value
  let content = {}

  if (type === 'add_item') {
    const name = document.getElementById('sug-item-name').value.trim()
    const desc = document.getElementById('sug-item-desc').value.trim()
    if (!name) return toast('Inserisci almeno il nome del servizio.', 'error')
    content = { name, description: desc }

  } else if (type === 'edit_item') {
    const idx    = document.getElementById('sug-edit-idx').value
    const reason = document.getElementById('sug-edit-reason').value.trim()
    if (idx === '') return toast('Seleziona l\'elemento da modificare.', 'error')
    const newName = document.getElementById('sug-edit-name').value.trim()
    const newDesc = document.getElementById('sug-edit-desc').value.trim()
    if (!newName && !newDesc) return toast('Inserisci almeno un campo da modificare.', 'error')
    const currentItem = cells[currentCell]?.items?.[parseInt(idx)] || {}
    content = {
      item_index:   parseInt(idx),
      current_name: currentItem.n,
      current_desc: currentItem.d,
      new_name:     newName  || null,
      new_desc:     newDesc  || null,
      reason
    }

  } else if (type === 'delete_item') {
    const idx    = document.getElementById('sug-delete-idx').value
    const reason = document.getElementById('sug-delete-reason').value.trim()
    if (idx === '') return toast('Seleziona l\'elemento da eliminare.', 'error')
    if (!reason)    return toast('Inserisci una motivazione.', 'error')
    const currentItem = cells[currentCell]?.items?.[parseInt(idx)] || {}
    content = {
      item_index:   parseInt(idx),
      current_name: currentItem.n,
      current_desc: currentItem.d,
      reason
    }

  } else if (type === 'change_coverage') {
    const cov    = document.getElementById('sug-cov').value
    const reason = document.getElementById('sug-cov-reason').value.trim()
    if (!reason) return toast('Inserisci una motivazione.', 'error')
    content = { new_coverage: cov, reason }

  } else if (type === 'change_label') {
    const label  = document.getElementById('sug-label-new').value.trim()
    const reason = document.getElementById('sug-label-reason').value.trim()
    if (!label) return toast('Inserisci il nuovo titolo.', 'error')
    content = { new_label: label, reason }

  } else {
    const note = document.getElementById('sug-note').value.trim()
    if (!note) return toast('Scrivi la tua nota.', 'error')
    content = { note }
  }

  const btn = document.getElementById('modal-submit-btn')
  btn.disabled = true; btn.textContent = 'Invio...'

  const { error } = await sb.from('suggestions').insert({
    cell_id: currentCell,
    suggested_by: currentUser.id,
    suggestion_type: type,
    content
  })

  btn.disabled = false; btn.textContent = 'Invia suggerimento'
  if (error) return toast('Errore: ' + error.message, 'error')
  closeSuggestModal()
  toast('Suggerimento inviato! Un admin lo revisionerà presto.', 'success')
  loadMySuggestions()
}

// ── My suggestions ───────────────────────────────────────────

async function loadMySuggestions() {
  if (currentProfile?.role === 'viewer') return

  const { data } = await sb.from('suggestions')
    .select('*, reviewer:reviewed_by(full_name)')
    .eq('suggested_by', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(20)

  if (!data || data.length === 0) return

  document.getElementById('my-sug-title').style.display = 'block'

  const rows = data.map(s => {
    const cell = cells[s.cell_id]
    const sector = SECTORS.find(sec => s.cell_id.startsWith(sec.id))
    const actIdx = parseInt(s.cell_id.split('-')[1])
    const cellLabel = cell ? `${sector?.label} × ${ACTIVITIES[actIdx]}` : s.cell_id
    const typeLabels = {add_item:'Aggiungi servizio', edit_item:'Modifica servizio',
                        delete_item:'Elimina servizio', change_coverage:'Cambia copertura',
                        change_label:'Cambia titolo', general_note:'Nota'}
    const contentStr =
      s.suggestion_type === 'add_item'
        ? s.content.name + (s.content.description ? ' — ' + s.content.description : '')
      : s.suggestion_type === 'edit_item'
        ? `"${s.content.current_name}" → ${s.content.new_name || s.content.current_name}${s.content.new_desc ? ' / ' + s.content.new_desc : ''}`
      : s.suggestion_type === 'delete_item'
        ? `Elimina: "${s.content.current_name}"`
      : s.suggestion_type === 'general_note'
        ? s.content.note
      : JSON.stringify(s.content)
    return `<tr>
      <td>${cellLabel}</td>
      <td>${typeLabels[s.suggestion_type] || s.suggestion_type}</td>
      <td style="max-width:220px">${contentStr}</td>
      <td><span class="status-badge status-${s.status}">${s.status}</span></td>
      <td style="color:var(--muted);font-size:11px">${s.review_note || ''}</td>
    </tr>`
  }).join('')

  document.getElementById('my-suggestions').innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">
      <table class="sug-table">
        <thead><tr><th>Cella</th><th>Tipo</th><th>Contenuto</th><th>Stato</th><th>Nota revisione</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`
}

// ── Utils ─────────────────────────────────────────────────────

function toast(msg, type='success') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast ' + type
  setTimeout(() => el.className = 'toast hidden', 3500)
}

async function logout() {
  await sb.auth.signOut()
  window.location.href = 'index.html'
}

init()
</script>
