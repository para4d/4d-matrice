<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riassegna Voci — 4D Sistemi</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #EEF5EE; }

    .page-wrap { padding: 1.5rem; display: grid;
      grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .page-wrap { grid-template-columns: 1fr; } }

    .panel { background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem; }
    .panel-title { font-size: 13px; font-weight: 600; margin-bottom: 1rem;
      color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* Mini matrix grid */
    .mini-grid { display: grid; grid-template-columns: 100px repeat(5, 1fr);
      gap: 4px; font-size: 11px; }
    .mini-head { font-size: 10px; color: var(--muted); font-weight: 600;
      text-align: center; padding: 4px 2px; }
    .mini-sector { font-size: 10px; font-weight: 600; padding: 4px;
      display: flex; align-items: center; }
    .mini-cell { border: 1px solid var(--border); border-radius: 4px;
      padding: 5px 6px; cursor: pointer; font-size: 10px; color: var(--muted);
      text-align: center; min-height: 36px; display: flex; align-items: center;
      justify-content: center; transition: all .15s; }
    .mini-cell:hover { border-color: #999; color: var(--text); }
    .mini-cell.selected-src  { background: #FCEBEB; border-color: var(--red);
      color: var(--red); font-weight: 600; }
    .mini-cell.selected-dst  { background: var(--con-bg); border-color: var(--con-color);
      color: var(--con-color); font-weight: 600; }
    .mini-cell.same-as-src   { opacity: .4; cursor: not-allowed; }

    /* Item list */
    .item-list { display: flex; flex-direction: column; gap: 6px; margin-top: .75rem; }
    .item-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; font-size: 12px; transition: all .15s; }
    .item-row:hover { border-color: var(--red); background: var(--red-bg); }
    .item-row.selected { background: var(--red-bg); border-color: var(--red);
      font-weight: 600; }
    .item-code { font-family: monospace; font-size: 10px; color: var(--muted);
      min-width: 32px; }
    .item-name { flex: 1; }
    .item-desc { font-size: 10px; color: var(--muted); }

    /* Preview panel */
    .preview-wrap { grid-column: 1 / -1; }
    .change-list { display: flex; flex-direction: column; gap: 8px; margin-top: .75rem; }
    .change-row { display: flex; align-items: baseline; gap: 8px; font-size: 12px;
      padding: 8px 12px; border-radius: var(--radius); }
    .change-row.step-main { background: #FCEBEB; border: 1px solid #f7c1c1; }
    .change-row.step-secondary { background: var(--red-bg); border: 1px solid #eee; }
    .change-row.step-warning { background: #FFF3CD; border: 1px solid #fce8a0; }
    .change-step { font-size: 10px; font-weight: 600; color: var(--muted);
      min-width: 20px; }
    .change-desc { flex: 1; }
    .code-old { font-family: monospace; font-size: 11px; background: #f0f0f0;
      padding: 1px 5px; border-radius: 3px; text-decoration: line-through; color: #999; }
    .code-new { font-family: monospace; font-size: 11px; background: #d4edda;
      padding: 1px 5px; border-radius: 3px; color: #155724; }
    .arrow { color: var(--muted); }

    /* Execution log */
    .exec-log { background: #1a1a2e; color: #7ec8e3; font-family: monospace;
      font-size: 12px; padding: 12px; border-radius: var(--radius);
      max-height: 220px; overflow-y: auto; margin-top: .75rem; }
    .exec-log.hidden { display: none; }
    .eok  { color: #4caf50; } .eerr { color: #f44336; } .einf { color: #7ec8e3; }

    .action-bar { display: flex; gap: 8px; margin-top: 1rem; align-items: center; }
    .status-msg { font-size: 12px; color: var(--muted); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header class="topbar">
  <span class="topbar-logo">4D Sistemi — Riassegna Voci</span>
  <div class="topbar-right">
    <span class="topbar-name" id="top-name"></span>
    <a href="admin.html" class="btn btn-secondary btn-sm">← Admin</a>
    <button class="btn-link" onclick="logout()">Esci</button>
  </div>
</header>

<div class="page-wrap">

  <!-- Pannello sorgente -->
  <div class="panel">
    <div class="panel-title">① Seleziona la voce da spostare</div>
    <div class="mini-grid" id="src-grid"></div>
    <div class="item-list hidden" id="src-items"></div>
  </div>

  <!-- Pannello destinazione -->
  <div class="panel">
    <div class="panel-title">② Seleziona la cella di destinazione</div>
    <div class="mini-grid" id="dst-grid"></div>
    <div style="margin-top:.75rem;font-size:12px;color:var(--muted)" id="dst-hint">
      Seleziona prima una voce sorgente.
    </div>
  </div>

  <!-- Preview modifiche -->
  <div class="panel preview-wrap hidden" id="preview-panel">
    <div class="panel-title">③ Anteprima modifiche</div>
    <div class="change-list" id="change-list"></div>
    <div class="exec-log hidden" id="exec-log"></div>
    <div class="action-bar">
      <button class="btn btn-primary" id="exec-btn" onclick="executeMove()">
        ✦ Esegui spostamento
      </button>
      <button class="btn btn-secondary" onclick="resetAll()">Annulla</button>
      <span class="status-msg" id="status-msg"></span>
    </div>
  </div>

</div>

<div id="toast" class="toast hidden"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sbMain = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
const FAT_BASE = 'https://pjyrjcdnmxthpwxpywip.supabase.co/rest/v1'
const FAT_KEY  = 'sb_publishable_iqrW_m5rY9_NX8C3_NPjNA_gXGBXBLt'
const FAT_HDR  = { 'apikey': FAT_KEY, 'Authorization': 'Bearer ' + FAT_KEY,
                   'Content-Type': 'application/json' }

const SECTORS    = [
  { id:'sec', label:'Security',       color:'var(--sec-color)' },
  { id:'con', label:'Continuity',     color:'var(--con-color)' },
  { id:'wor', label:'Workplace',      color:'var(--wor-color)' },
  { id:'inf', label:'Infrastructure', color:'var(--inf-color)' },
  { id:'man', label:'Management',     color:'var(--man-color)' },
]
const ACTIVITIES = ['Cons.','Prog.','Forn.','Inst.','Man.']
const ACTS_FULL  = ['Consulenza','Progettazione','Fornitura / Produzione','Installazione','Manutenzione']

let cells       = {}   // cell_id → { id, items, label, coverage }
let srcCell     = null
let srcItemIdx  = null
let dstCell     = null

// ── Helpers ──────────────────────────────────────────────────
function cod(cell_id, item_index) {
  const [sid, ai] = cell_id.split('-')
  const row = ['sec','con','wor','inf','man'].indexOf(sid) + 1
  const col = String.fromCharCode(65 + parseInt(ai))
  const itl = String.fromCharCode(97 + item_index)
  return col + row + itl
}

async function fatGet(path) {
  const r = await fetch(FAT_BASE + path, { headers: FAT_HDR })
  if (!r.ok) { const t = await r.text(); throw new Error('GET ' + r.status + ': ' + t) }
  return r.json()
}
async function fatPatch(path, body) {
  const r = await fetch(FAT_BASE + path, {
    method: 'PATCH', headers: { ...FAT_HDR, 'Prefer': 'return=minimal' },
    body: JSON.stringify(body) })
  if (!r.ok) { const t = await r.text(); throw new Error('PATCH ' + r.status + ': ' + t) }
}
async function fatDelete(path) {
  const r = await fetch(FAT_BASE + path, { method: 'DELETE', headers: FAT_HDR })
  if (!r.ok) { const t = await r.text(); throw new Error('DELETE ' + r.status + ': ' + t) }
}

function elog(msg, cls='einf') {
  const b = document.getElementById('exec-log')
  b.classList.remove('hidden')
  const d = document.createElement('div'); d.className = cls; d.textContent = msg
  b.appendChild(d); b.scrollTop = b.scrollHeight
}
function toast(msg, type='success') {
  const el = document.getElementById('toast')
  el.textContent = msg; el.className = 'toast ' + type
  setTimeout(() => el.className = 'toast hidden', 4000)
}
async function logout() { await sbMain.auth.signOut(); window.location.href = 'index.html' }

// ── Init ─────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sbMain.auth.getSession()
  if (!session) { window.location.href = 'index.html'; return }
  const { data: profile } = await sbMain.from('profiles')
    .select('full_name,role').eq('id', session.user.id).single()
  if (!profile || profile.role !== 'admin') {
    window.location.href = 'matrix.html'; return
  }
  document.getElementById('top-name').textContent = profile.full_name || session.user.email

  const { data: dbCells } = await sbMain.from('matrix_cells').select('*')
  if (dbCells) dbCells.forEach(c => { cells[c.id] = c })

  renderGrid('src-grid', onSrcCellClick, null)
  renderGrid('dst-grid', onDstCellClick, null)
}

// ── Griglia mini ─────────────────────────────────────────────
function renderGrid(gridId, clickFn, disabledCell) {
  const grid = document.getElementById(gridId)
  let html = '<div class="mini-head"></div>'
  ACTIVITIES.forEach(a => { html += `<div class="mini-head">${a}</div>` })

  SECTORS.forEach(s => {
    html += `<div class="mini-sector" style="color:${s.color}">${s.label}</div>`
    for (let i = 0; i < 5; i++) {
      const id   = s.id + '-' + i
      const cell = cells[id]
      const label = cell ? cell.label : '—'
      const isSrc = id === srcCell
      const isDst = id === dstCell
      const isDisabled = id === disabledCell
      const cls = isDisabled ? 'mini-cell same-as-src'
                : isSrc      ? 'mini-cell selected-src'
                : isDst      ? 'mini-cell selected-dst'
                : 'mini-cell'
      html += `<div class="${cls}" data-id="${id}"
                onclick="${isDisabled ? '' : `${clickFn.name}('${id}')`}"
                title="${label}">${label}</div>`
    }
  })
  grid.innerHTML = html
}

// ── Sorgente ─────────────────────────────────────────────────
function onSrcCellClick(id) {
  srcCell    = id
  srcItemIdx = null
  dstCell    = null
  document.getElementById('preview-panel').classList.add('hidden')
  document.getElementById('dst-hint').textContent = 'Seleziona prima una voce sorgente.'

  renderGrid('src-grid', onSrcCellClick, null)
  renderGrid('dst-grid', onDstCellClick, srcCell)
  renderSrcItems()
}

function renderSrcItems() {
  const cell  = cells[srcCell]
  const items = cell?.items || []
  const el    = document.getElementById('src-items')

  if (!items.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">Nessuna voce in questa cella.</div>'; el.classList.remove('hidden'); return }

  el.innerHTML = items.map((it, idx) => `
    <div class="item-row ${srcItemIdx === idx ? 'selected' : ''}"
         onclick="onItemClick(${idx})">
      <span class="item-code">${cod(srcCell, idx)}</span>
      <span class="item-name">${it.n}</span>
      ${it.d ? `<span class="item-desc">${it.d}</span>` : ''}
    </div>`).join('')
  el.classList.remove('hidden')
}

function onItemClick(idx) {
  srcItemIdx = idx
  dstCell    = null
  document.getElementById('preview-panel').classList.add('hidden')
  document.getElementById('dst-hint').textContent = 'Seleziona la cella di destinazione.'
  renderSrcItems()
  renderGrid('dst-grid', onDstCellClick, srcCell)
}

// ── Destinazione ─────────────────────────────────────────────
function onDstCellClick(id) {
  if (srcItemIdx === null) {
    toast('Seleziona prima una voce nella cella sorgente.', 'error'); return
  }
  dstCell = id
  renderGrid('src-grid', onSrcCellClick, null)
  renderGrid('dst-grid', onDstCellClick, srcCell)
  buildPreview()
}

// ── Preview ───────────────────────────────────────────────────
function buildPreview() {
  if (!srcCell || srcItemIdx === null || !dstCell) return

  const srcItems = [...(cells[srcCell]?.items || [])]
  const dstItems = [...(cells[dstCell]?.items || [])]
  const movedItem = srcItems[srcItemIdx]

  // Codici prima dello spostamento
  const oldMovedCode = cod(srcCell, srcItemIdx)
  // Elementi che si spostano indietro nella sorgente (dopo l'indice rimosso)
  const shiftedSrc = srcItems.slice(srcItemIdx + 1).map((it, i) => ({
    item: it,
    oldCode: cod(srcCell, srcItemIdx + 1 + i),
    newCode: cod(srcCell, srcItemIdx + i),
  }))
  // Nuovo codice nella destinazione (aggiunto in fondo)
  const newMovedCode = cod(dstCell, dstItems.length)

  const srcLabel = cells[srcCell]?.label || srcCell
  const dstLabel = cells[dstCell]?.label || dstCell
  const srcAct   = ACTS_FULL[parseInt(srcCell.split('-')[1])]
  const dstAct   = ACTS_FULL[parseInt(dstCell.split('-')[1])]

  let changes = []

  // Step 1: matrix_cells sorgente
  changes.push({ cls:'step-main', step:'1a',
    html: `<b>matrix_cells</b> — rimuovi "<b>${movedItem.n}</b>" da <b>${srcAct} × ${srcLabel}</b>`
  })
  // Step 1b: matrix_cells destinazione
  changes.push({ cls:'step-main', step:'1b',
    html: `<b>matrix_cells</b> — aggiungi "<b>${movedItem.n}</b>" in <b>${dstAct} × ${dstLabel}</b>`
  })

  // Step 2: riscalatura indici nella cella sorgente
  shiftedSrc.forEach(s => {
    changes.push({ cls:'step-secondary', step:'2',
      html: `catalogo_4dm &amp; mapping: <span class="code-old">${s.oldCode}</span> <span class="arrow">→</span> <span class="code-new">${s.newCode}</span> &nbsp;<span style="color:var(--muted)">"${s.item.n}"</span>`
    })
  })

  // Step 3: voce spostata
  changes.push({ cls:'step-main', step:'3',
    html: `codice voce spostata: <span class="code-old">${oldMovedCode}</span> <span class="arrow">→</span> <span class="code-new">${newMovedCode}</span>`
  })

  // Step 4: catalog_cards
  changes.push({ cls:'step-warning', step:'4',
    html: `catalog_cards — aggiorna cell_id e item_index per la scheda collegata (se esiste)`
  })
  shiftedSrc.forEach(s => {
    changes.push({ cls:'step-warning', step:'4',
      html: `catalog_cards — aggiorna item_index per "${s.item.n}": ${srcItemIdx+1+shiftedSrc.indexOf(s)} → ${srcItemIdx+shiftedSrc.indexOf(s)}`
    })
  })

  document.getElementById('change-list').innerHTML = changes.map(c => `
    <div class="change-row ${c.cls}">
      <span class="change-step">${c.step}</span>
      <span class="change-desc">${c.html}</span>
    </div>`).join('')

  document.getElementById('exec-log').innerHTML = ''
  document.getElementById('exec-log').classList.add('hidden')
  document.getElementById('status-msg').textContent = ''
  document.getElementById('exec-btn').disabled = false
  document.getElementById('preview-panel').classList.remove('hidden')
  document.getElementById('preview-panel').scrollIntoView({ behavior:'smooth', block:'start' })

  // Salva in stato per l'esecuzione
  window._moveState = { srcCell, srcItemIdx, dstCell, movedItem,
    shiftedSrc, oldMovedCode, newMovedCode }
}

// ── Esecuzione ────────────────────────────────────────────────
async function executeMove() {
  const { srcCell, srcItemIdx, dstCell, movedItem,
          shiftedSrc, oldMovedCode, newMovedCode } = window._moveState

  const btn = document.getElementById('exec-btn')
  btn.disabled = true
  document.getElementById('status-msg').textContent = 'Esecuzione in corso...'

  try {
    // ── STEP 1: Aggiorna matrix_cells ─────────────────────────
    elog('▶ Step 1: aggiorna matrix_cells...')

    const newSrcItems = [...cells[srcCell].items]
    newSrcItems.splice(srcItemIdx, 1)
    const { error: e1 } = await sbMain.from('matrix_cells')
      .update({ items: newSrcItems }).eq('id', srcCell)
    if (e1) throw new Error('matrix_cells sorgente: ' + e1.message)
    elog('  ✓ rimossa da cella sorgente', 'eok')

    const newDstItems = [...cells[dstCell].items, movedItem]
    const { error: e2 } = await sbMain.from('matrix_cells')
      .update({ items: newDstItems }).eq('id', dstCell)
    if (e2) throw new Error('matrix_cells destinazione: ' + e2.message)
    elog('  ✓ aggiunta a cella destinazione', 'eok')

    // Aggiorna stato locale
    cells[srcCell] = { ...cells[srcCell], items: newSrcItems }
    cells[dstCell] = { ...cells[dstCell], items: newDstItems }

    // ── STEP 2: Riscalatura indici nella cella sorgente ───────
    if (shiftedSrc.length > 0) {
      elog('▶ Step 2: aggiorna codici voci scalate nella cella sorgente...')
      // Aggiorna in ordine crescente di indice per evitare conflitti
      for (const s of shiftedSrc) {
        // catalogo_4dm
        await fatPatch(`/catalogo_4dm?codice_4dm=eq.${encodeURIComponent(s.oldCode)}`,
          { codice_4dm: s.newCode })
        elog(`  ✓ catalogo_4dm: ${s.oldCode} → ${s.newCode}`, 'eok')

        // mapping_articoli_4dm
        await fatPatch(`/mapping_articoli_4dm?codice_4dm=eq.${encodeURIComponent(s.oldCode)}`,
          { codice_4dm: s.newCode })
        elog(`  ✓ mapping: ${s.oldCode} → ${s.newCode}`, 'eok')

        // catalog_cards
        const origIdx = srcItemIdx + 1 + shiftedSrc.indexOf(s)
        const { error: ec } = await sbMain.from('catalog_cards')
          .update({ item_index: origIdx - 1 })
          .eq('cell_id', srcCell).eq('item_index', origIdx)
        if (ec) elog(`  ⚠ catalog_cards ${srcCell}:${origIdx}: ${ec.message}`)
        else elog(`  ✓ catalog_cards item_index ${origIdx} → ${origIdx - 1}`, 'eok')
      }
    }

    // ── STEP 3: Codice voce spostata ──────────────────────────
    elog('▶ Step 3: aggiorna codice voce spostata...')

    // PATCH del codice_4dm nel catalogo (preserva tutti gli altri campi)
    await fatPatch(`/catalogo_4dm?codice_4dm=eq.${encodeURIComponent(oldMovedCode)}`,
      { codice_4dm: newMovedCode })
    elog(`  ✓ catalogo_4dm: ${oldMovedCode} → ${newMovedCode}`, 'eok')

    // Aggiorna mapping: tutti i record con oldMovedCode → newMovedCode
    await fatPatch(`/mapping_articoli_4dm?codice_4dm=eq.${encodeURIComponent(oldMovedCode)}`,
      { codice_4dm: newMovedCode })
    elog(`  ✓ mapping_articoli_4dm: ${oldMovedCode} → ${newMovedCode}`, 'eok')

    // ── STEP 4: catalog_cards della voce spostata ─────────────
    elog('▶ Step 4: aggiorna catalog_cards...')
    const dstIdx = cells[dstCell].items.length - 1  // è stato aggiunto in fondo
    const { error: e4 } = await sbMain.from('catalog_cards')
      .update({ cell_id: dstCell, item_index: dstIdx })
      .eq('cell_id', srcCell).eq('item_index', srcItemIdx)
    if (e4) elog('  ⚠ catalog_cards voce spostata: ' + e4.message)
    else elog(`  ✓ catalog_cards: ${srcCell}:${srcItemIdx} → ${dstCell}:${dstIdx}`, 'eok')

    // ── Fine ──────────────────────────────────────────────────
    elog('', '')
    elog(`✅ Spostamento completato: "${movedItem.n}"`, 'eok')
    elog(`   ${oldMovedCode} (${srcCell}) → ${newMovedCode} (${dstCell})`, 'eok')

    document.getElementById('status-msg').textContent = 'Spostamento completato.'
    toast(`"${movedItem.n}" spostato con successo.`)

    // Reset selezione e ricarica griglia
    setTimeout(() => resetAll(), 1500)

  } catch(err) {
    elog('✗ ERRORE: ' + err.message, 'eerr')
    elog('  Controlla il log e verifica lo stato del DB prima di riprovare.', 'eerr')
    document.getElementById('status-msg').textContent = 'Errore — vedi log.'
    toast('Errore durante lo spostamento: ' + err.message, 'error')
    btn.disabled = false
  }
}

// ── Reset ─────────────────────────────────────────────────────
function resetAll() {
  srcCell = null; srcItemIdx = null; dstCell = null
  window._moveState = null
  document.getElementById('src-items').classList.add('hidden')
  document.getElementById('src-items').innerHTML = ''
  document.getElementById('dst-hint').textContent = 'Seleziona prima una voce sorgente.'
  document.getElementById('preview-panel').classList.add('hidden')
  renderGrid('src-grid', onSrcCellClick, null)
  renderGrid('dst-grid', onDstCellClick, null)
}

init()
</script>
</body>
</html>
