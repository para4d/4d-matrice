<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immagini Schede — 4D Sistemi</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #EEF5EE; }
    .page-wrap { padding: 1.5rem; }

    /* Upload area */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius-lg);
      background: var(--white); padding: 2rem; text-align: center;
      cursor: pointer; transition: border-color .2s, background .2s;
      margin-bottom: 1.5rem;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--red); background: var(--red-bg);
    }
    .upload-area input[type=file] { display: none; }
    .upload-icon { font-size: 32px; margin-bottom: .5rem; }
    .upload-label { font-size: 14px; font-weight: 500; color: var(--text); }
    .upload-hint  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .upload-btn   { margin-top: 1rem; }

    /* Progress */
    .progress-wrap { margin-bottom: 1.5rem; display: none; }
    .progress-bar-bg { background: #eee; border-radius: 4px; height: 6px; }
    .progress-bar    { background: var(--red); height: 6px; border-radius: 4px;
      transition: width .3s; width: 0; }
    .progress-label  { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Toolbar */
    .img-toolbar { display: flex; gap: 8px; margin-bottom: 1rem;
      flex-wrap: wrap; align-items: center; }
    .img-toolbar input {
      padding: 7px 10px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px;
      background: var(--white); width: 240px; }
    .img-count { font-size: 12px; color: var(--muted); margin-left: auto; }

    /* Gallery grid */
    .gallery { display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; }

    .img-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .img-thumb-wrap {
      height: 130px; background: #f5f5f5; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
    }
    .img-thumb-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .2s;
    }
    .img-thumb-wrap:hover img { transform: scale(1.04); }
    .img-thumb-wrap .img-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s; font-size: 22px;
    }
    .img-thumb-wrap:hover .img-overlay { opacity: 1; }

    .img-info { padding: 8px 10px; flex: 1;
      display: flex; flex-direction: column; gap: 4px; }
    .img-name { font-size: 11px; font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .img-size { font-size: 10px; color: var(--muted); }

    .img-url-row { display: flex; gap: 4px; margin-top: 4px; }
    .img-url-input {
      flex: 1; padding: 4px 6px; font-size: 10px; font-family: monospace;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: #f8f8f8; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-copy {
      padding: 4px 8px; font-size: 10px; font-weight: 600;
      border: none; border-radius: var(--radius); cursor: pointer;
      background: var(--red); color: #fff; white-space: nowrap;
      flex-shrink: 0; }
    .btn-copy:hover { opacity: .85; }
    .btn-copy.copied { background: var(--con-color); }

    .img-actions { display: flex; gap: 4px; padding: 6px 10px 8px;
      border-top: 1px solid #eee; }
    .btn-del { padding: 3px 8px; font-size: 10px; border-radius: var(--radius);
      border: 1px solid #eee; background: var(--white); cursor: pointer;
      color: var(--muted); }
    .btn-del:hover { border-color: var(--red); color: var(--red);
      background: var(--red-bg); }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; cursor: zoom-out; }
    .lightbox.hidden { display: none; }
    .lightbox img { max-width: 90vw; max-height: 90vh;
      object-fit: contain; border-radius: 4px; }

    .empty-gallery { text-align: center; padding: 3rem;
      color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<header class="topbar">
  <span class="topbar-logo">4D Sistemi — Immagini Schede</span>
  <div class="topbar-right">
    <span class="topbar-name" id="top-name"></span>
    <a href="admin.html" class="btn btn-secondary btn-sm">← Admin</a>
    <button class="btn-link" onclick="logout()">Esci</button>
  </div>
</header>

<div class="page-wrap">

  <!-- Upload -->
  <div class="upload-area" id="upload-area"
    onclick="document.getElementById('file-input').click()"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
    ondrop="onDrop(event)">
    <input type="file" id="file-input" multiple
      accept="image/*" onchange="uploadFiles(this.files)">
    <div class="upload-icon">🖼</div>
    <div class="upload-label">Trascina le immagini qui oppure clicca per selezionarle</div>
    <div class="upload-hint">PNG, JPG, WebP, SVG · max 5MB per file</div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <!-- Toolbar -->
  <div class="img-toolbar" id="img-toolbar" style="display:none">
    <input type="text" id="search"
      placeholder="Cerca per nome..." oninput="filterGallery()">
    <button class="btn btn-secondary btn-sm" onclick="loadImages()">↻ Aggiorna</button>
    <span class="img-count" id="img-count"></span>
  </div>

  <!-- Gallery -->
  <div class="gallery" id="gallery">
    <div class="empty-gallery">Caricamento...</div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb     = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
const BUCKET = 'schede-immagini'

let allFiles = []   // { name, url, size, created_at }

async function logout() { await sb.auth.signOut(); window.location.href = 'index.html' }

function toast(msg, type='success') {
  const el = document.getElementById('toast')
  el.textContent = msg; el.className = 'toast ' + type
  setTimeout(() => el.className = 'toast hidden', 3000)
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B'
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'
  return (bytes/1024/1024).toFixed(1) + ' MB'
}

// ── Auth ──────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { window.location.href = 'index.html'; return }
  const { data: profile } = await sb.from('profiles')
    .select('full_name,role').eq('id', session.user.id).single()
  if (!profile || profile.role !== 'admin') {
    window.location.href = 'matrix.html'; return
  }
  document.getElementById('top-name').textContent = profile.full_name || session.user.email
  loadImages()
}

// ── Load images ───────────────────────────────────────────────
async function loadImages() {
  const { data, error } = await sb.storage.from(BUCKET).list('', {
    sortBy: { column: 'created_at', order: 'desc' }
  })

  if (error) {
    if (error.message?.includes('does not exist') || error.message?.includes('Bucket')) {
      document.getElementById('gallery').innerHTML =
        `<div class="empty-gallery">
          Bucket "<b>${BUCKET}</b>" non trovato.<br>
          Crea il bucket su Supabase Dashboard → Storage → New bucket<br>
          Nome: <code>${BUCKET}</code> · Public: ✓
        </div>`
      return
    }
    toast('Errore caricamento: ' + error.message, 'error'); return
  }

  // Filtra le cartelle
  const files = (data || []).filter(f => f.name && !f.id?.endsWith('/'))

  allFiles = files.map(f => {
    const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(f.name)
    // Forza il percorso corretto con /public/ se mancante
    let publicUrl = urlData.publicUrl
    if (publicUrl && !publicUrl.includes('/object/public/')) {
      publicUrl = publicUrl.replace('/object/', '/object/public/')
    }
    return { name: f.name, url: publicUrl, size: f.metadata?.size || 0,
             created_at: f.created_at }
  })

  document.getElementById('img-toolbar').style.display = 'flex'
  filterGallery()
}

// ── Filter ────────────────────────────────────────────────────
function filterGallery() {
  const s = document.getElementById('search').value.toLowerCase()
  const filtered = s
    ? allFiles.filter(f => f.name.toLowerCase().includes(s))
    : allFiles

  document.getElementById('img-count').textContent =
    `${filtered.length} immagini${allFiles.length !== filtered.length ? ' (filtrate su ' + allFiles.length + ')' : ''}`

  if (!filtered.length) {
    document.getElementById('gallery').innerHTML =
      `<div class="empty-gallery">${s ? 'Nessuna immagine trovata.' : 'Nessuna immagine ancora caricata.'}</div>`
    return
  }

  document.getElementById('gallery').innerHTML = filtered.map(f => `
    <div class="img-card" id="card-${CSS.escape(f.name)}">
      <div class="img-thumb-wrap" onclick="openLightbox('${f.url}')">
        <img src="${f.url}" alt="${f.name}" loading="lazy">
        <div class="img-overlay">🔍</div>
      </div>
      <div class="img-info">
        <div class="img-name" title="${f.name}">${f.name}</div>
        <div class="img-size">${fmtSize(f.size)}</div>
        <div class="img-url-row">
          <input class="img-url-input" readonly value="${f.url}"
            onclick="this.select()" title="${f.url}">
          <button class="btn-copy" onclick="copyUrl('${f.url}', this)">
            Copia URL
          </button>
        </div>
      </div>
      <div class="img-actions">
        <button class="btn-del" onclick="deleteImage('${f.name}')">
          🗑 Elimina
        </button>
      </div>
    </div>`).join('')
}

// ── Upload ────────────────────────────────────────────────────
function onDragOver(e) {
  e.preventDefault()
  document.getElementById('upload-area').classList.add('drag-over')
}
function onDragLeave() {
  document.getElementById('upload-area').classList.remove('drag-over')
}
function onDrop(e) {
  e.preventDefault()
  document.getElementById('upload-area').classList.remove('drag-over')
  uploadFiles(e.dataTransfer.files)
}

async function uploadFiles(files) {
  if (!files || !files.length) return
  const arr = Array.from(files)
  const MAX  = 5 * 1024 * 1024

  // Validazione
  const tooBig = arr.filter(f => f.size > MAX)
  if (tooBig.length) {
    toast(`${tooBig.map(f=>f.name).join(', ')}: superano 5MB`, 'error'); return
  }

  const pw = document.getElementById('progress-wrap')
  const pb = document.getElementById('progress-bar')
  const pl = document.getElementById('progress-label')
  pw.style.display = 'block'

  let done = 0, errors = []

  for (const file of arr) {
    pl.textContent = `Caricamento ${file.name} (${done + 1}/${arr.length})...`
    pb.style.width = (done / arr.length * 100) + '%'

    // Sanitizza il nome: spazi → trattini, minuscolo
    const safeName = file.name
      .toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9.\-_]/g, '')

    const { data: upData, error } = await sb.storage.from(BUCKET)
      .upload(safeName, file, {
        upsert: true,
        contentType: file.type || 'image/jpeg',
      })

    if (error) {
      console.error('Upload error:', error)
      errors.push(`${file.name}: ${error.message || JSON.stringify(error)}`)
    } else done++
  }

  pb.style.width = '100%'
  pl.textContent = `${done} caricati${errors.length ? `, ${errors.length} errori` : ''}`

  setTimeout(() => { pw.style.display = 'none'; pb.style.width = '0' }, 2000)

  if (errors.length) toast(errors[0], 'error')
  else toast(`${done} immagine${done > 1 ? 'i' : ''} caricata${done > 1 ? 'e' : ''} con successo.`)

  loadImages()
}

// ── Copy URL ─────────────────────────────────────────────────
async function copyUrl(url, btn) {
  try {
    await navigator.clipboard.writeText(url)
    const orig = btn.textContent
    btn.textContent = '✓ Copiato'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied') }, 2000)
  } catch(e) {
    // Fallback: seleziona il campo input vicino
    const input = btn.previousElementSibling
    if (input) { input.select(); document.execCommand('copy') }
    toast('URL copiato negli appunti.')
  }
}

// ── Delete ────────────────────────────────────────────────────
async function deleteImage(name) {
  if (!confirm(`Eliminare "${name}"?\n\nL'immagine verrà rimossa anche dalle schede che la usano.`)) return
  const { error } = await sb.storage.from(BUCKET).remove([name])
  if (error) { toast('Errore: ' + error.message, 'error'); return }
  toast(`"${name}" eliminata.`)
  loadImages()
}

// ── Lightbox ──────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url
  document.getElementById('lightbox').classList.remove('hidden')
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden')
  document.getElementById('lightbox-img').src = ''
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox()
})

init()
</script>
</body>
</html>
