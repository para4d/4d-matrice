<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — 4D Sistemi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <span class="topbar-logo">4D Sistemi — Pannello Admin</span>
  <div class="topbar-right">
    <span class="topbar-name" id="top-name"></span>
    <span class="badge badge-admin">admin</span>
    <a href="matrix.html" class="btn btn-secondary btn-sm">← Matrice</a>
    <button class="btn-link" onclick="logout()">Esci</button>
  </div>
</header>

<!-- Stats -->
<div class="stats-row" id="stats-row">
  <div class="stat-card"><div class="stat-val" id="stat-pending">—</div><div class="stat-label">Suggerimenti in attesa</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Suggerimenti totali</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-users">—</div><div class="stat-label">Collaboratori registrati</div></div>
</div>

<div class="page-content">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('suggestions')">Suggerimenti <span id="pending-badge"></span></button>
    <button class="tab-btn" onclick="switchTab('users')">Gestione utenti</button>
    <button class="tab-btn" onclick="switchTab('matrix')">Modifica matrice</button>
    <button class="tab-btn" onclick="switchTab('log')">Log attività</button>
  </div>

  <!-- TAB: Suggerimenti -->
  <div id="tab-suggestions">
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="filterSuggestions('pending')">In attesa</button>
      <button class="btn btn-secondary btn-sm" onclick="filterSuggestions('approved')">Approvati</button>
      <button class="btn btn-secondary btn-sm" onclick="filterSuggestions('rejected')">Rifiutati</button>
      <button class="btn btn-secondary btn-sm" onclick="filterSuggestions('all')">Tutti</button>
    </div>
    <div id="suggestions-list">
      <p style="color:var(--muted);font-size:13px">Caricamento...</p>
    </div>
  </div>

  <!-- TAB: Utenti -->
  <div id="tab-users" class="hidden">
    <div id="users-list">
      <p style="color:var(--muted);font-size:13px">Caricamento...</p>
    </div>
  </div>

  <!-- TAB: Modifica matrice -->
  <div id="tab-matrix" class="hidden">
    <p style="color:var(--muted);font-size:13px;margin-bottom:1rem">
      Clicca su una cella per modificarla direttamente. Attenzione: le modifiche sono immediate.
    </p>
    <div id="cell-editor" style="display:none" class="card" style="margin-bottom:1rem">
      <p class="modal-title" id="editor-title"></p>
      <div class="form-group" style="margin-top:1rem">
        <label>Copertura</label>
        <select id="editor-cov">
          <option value="full">Piena</option>
          <option value="partial">Parziale</option>
          <option value="gap">Gap</option>
        </select>
      </div>
      <div class="form-group">
        <label>Titolo cella</label>
        <input type="text" id="editor-label">
      </div>
      <div class="form-group">
        <label>Servizi/prodotti (uno per riga: Nome | Descrizione)</label>
        <textarea id="editor-items" rows="8" style="font-family:monospace;font-size:12px"></textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveCell()">Salva modifiche</button>
        <button class="btn btn-secondary" onclick="closeEditor()">Annulla</button>
      </div>
    </div>
    <div class="matrix-wrap" style="padding:0">
      <table class="matrix-table" id="admin-matrix-table">
        <thead id="admin-matrix-head"></thead>
        <tbody id="admin-matrix-body"></tbody>
      </table>
    </div>
  </div>

  <!-- TAB: Log attività -->
  <div id="tab-log" class="hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="filterLog('all')">Tutti</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLog('cell_updated')">Modifiche celle</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLog('suggestion_submitted')">Suggerimenti inviati</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLog('suggestion_approved')">Approvazioni</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLog('suggestion_rejected')">Rifiuti</button>
        <button class="btn btn-secondary btn-sm" onclick="filterLog('role_changed')">Cambi ruolo</button>
      </div>
      <div id="log-size-badge" style="font-size:12px;color:var(--muted)"></div>
    </div>
    <div id="log-list">
      <p style="color:var(--muted);font-size:13px">Caricamento...</p>
    </div>
    <div style="margin-top:10px;text-align:center">
      <button id="log-load-more" class="btn btn-secondary btn-sm hidden" onclick="loadMoreLog()">Carica altri</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const SECTORS = [
  { id:'sec', label:'Security',       color:'var(--sec-color)', bg:'var(--sec-bg)' },
  { id:'con', label:'Continuity',     color:'var(--con-color)', bg:'var(--con-bg)' },
  { id:'wor', label:'Workplace',      color:'var(--wor-color)', bg:'var(--wor-bg)' },
  { id:'inf', label:'Infrastructure', color:'var(--inf-color)', bg:'var(--inf-bg)' },
  { id:'man', label:'Management',     color:'var(--man-color)', bg:'var(--man-bg)' },
]
const ACTIVITIES = ['Consulenza','Progettazione','Fornitura','Installazione','Manutenzione']
const COV_LABELS = { full:'Piena', partial:'Parziale', gap:'Gap' }

let cells = {}
let allSuggestions = []
let currentSugFilter = 'pending'
let editingCellId = null

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) return window.location.href = 'index.html'

  const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single()
  if (!profile || profile.role !== 'admin') return window.location.href = 'matrix.html'

  document.getElementById('top-name').textContent = profile.full_name || profile.email

  await loadData()
}

async function loadData() {
  const [{ data: dbCells }, { data: sugs }, { data: users }] = await Promise.all([
    sb.from('matrix_cells').select('*'),
    sb.from('suggestions').select('*, submitter:suggested_by(full_name,email), reviewer:reviewed_by(full_name)').order('created_at', { ascending: false }),
    sb.from('profiles').select('*').order('created_at')
  ])

  if (dbCells) dbCells.forEach(c => cells[c.id] = c)
  allSuggestions = sugs || []

  const pending = allSuggestions.filter(s => s.status === 'pending').length
  document.getElementById('stat-pending').textContent = pending
  document.getElementById('stat-total').textContent = allSuggestions.length
  document.getElementById('stat-users').textContent = users?.length || 0
  document.getElementById('pending-badge').textContent = pending > 0 ? ` (${pending})` : ''

  renderSuggestions()
  renderUsers(users || [])
  renderAdminMatrix()
}

// ── Tab switching ─────────────────────────────────────────────

function switchTab(t) {
  ;['suggestions','users','matrix','log'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('hidden', id !== t)
  })
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['suggestions','users','matrix','log'][i] === t)
  })
  if (t === 'log') loadLog()
}

// ── Suggestions ───────────────────────────────────────────────

function filterSuggestions(f) {
  currentSugFilter = f
  renderSuggestions()
}

function renderSuggestions() {
  const list = currentSugFilter === 'all' ? allSuggestions
    : allSuggestions.filter(s => s.status === currentSugFilter)

  if (list.length === 0) {
    document.getElementById('suggestions-list').innerHTML =
      `<p style="color:var(--muted);font-size:13px">Nessun suggerimento ${currentSugFilter === 'pending' ? 'in attesa' : ''} al momento.</p>`
    return
  }

  const html = list.map(s => {
    const cell = cells[s.cell_id]
    const sector = SECTORS.find(sec => s.cell_id?.startsWith(sec.id))
    const actIdx = parseInt(s.cell_id?.split('-')[1])
    const cellLabel = cell ? `${sector?.label} × ${ACTIVITIES[actIdx]} — "${cell.label}"` : s.cell_id
    const typeLabels = { add_item:'Aggiungi servizio', edit_item:'Modifica servizio',
                         delete_item:'Elimina servizio', change_coverage:'Cambia copertura',
                         change_label:'Cambia titolo', general_note:'Nota' }
    const date = new Date(s.created_at).toLocaleDateString('it-IT')

    let contentHtml = ''
    if (s.suggestion_type === 'add_item') {
      contentHtml = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px">
          <span style="color:var(--muted)">Nome:</span>
          <strong>${s.content.name || '—'}</strong>
          <span style="color:var(--muted)">Descrizione:</span>
          <span>${s.content.description || '—'}</span>
        </div>`
    } else if (s.suggestion_type === 'edit_item') {
      contentHtml = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px">
          <span style="color:var(--muted)">Elemento:</span>
          <strong>${s.content.current_name || '—'}</strong>
          ${s.content.new_name ? `<span style="color:var(--muted)">Nuovo nome:</span><span style="color:#3B6D11"><strong>${s.content.new_name}</strong></span>` : ''}
          ${s.content.new_desc ? `<span style="color:var(--muted)">Nuova descrizione:</span><span style="color:#3B6D11">${s.content.new_desc}</span>` : ''}
          ${s.content.reason ? `<span style="color:var(--muted)">Motivazione:</span><em>${s.content.reason}</em>` : ''}
        </div>`
    } else if (s.suggestion_type === 'delete_item') {
      contentHtml = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px">
          <span style="color:var(--muted)">Elimina:</span>
          <strong style="color:#A32D2D">${s.content.current_name || '—'}</strong>
          ${s.content.current_desc ? `<span style="color:var(--muted)">Descrizione attuale:</span><span>${s.content.current_desc}</span>` : ''}
          <span style="color:var(--muted)">Motivazione:</span>
          <em>${s.content.reason || '—'}</em>
        </div>`
    } else if (s.suggestion_type === 'change_coverage') {
      const covColors = { full:'#3B6D11', partial:'#854F0B', gap:'#A32D2D' }
      const currentCov = cell?.coverage || '—'
      contentHtml = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px">
          <span style="color:var(--muted)">Copertura attuale:</span>
          <span>${COV_LABELS[currentCov] || currentCov}</span>
          <span style="color:var(--muted)">Proposta:</span>
          <strong style="color:${covColors[s.content.new_coverage]}">${COV_LABELS[s.content.new_coverage] || s.content.new_coverage}</strong>
          <span style="color:var(--muted)">Motivazione:</span>
          <em>${s.content.reason || '—'}</em>
        </div>`
    } else if (s.suggestion_type === 'change_label') {
      contentHtml = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px">
          <span style="color:var(--muted)">Titolo attuale:</span>
          <span>${cell?.label || '—'}</span>
          <span style="color:var(--muted)">Proposto:</span>
          <strong style="color:#3B6D11">${s.content.new_label || '—'}</strong>
          ${s.content.reason ? `<span style="color:var(--muted)">Motivazione:</span><em>${s.content.reason}</em>` : ''}
        </div>`
    } else {
      contentHtml = `<span style="font-size:12px">${s.content.note || '—'}</span>`
    }

    // Stato attuale della cella (per context)
    const cellPreview = cell ? `
      <div style="margin-top:10px;padding:8px 10px;background:#f5f5f5;
                  border-radius:var(--radius);font-size:11px;color:var(--muted)">
        <strong style="color:var(--text)">Stato attuale della cella:</strong>
        ${cell.items.map(it => `<span style="display:inline-block;margin:3px 4px 0 0;
          background:white;border:1px solid var(--border);border-radius:4px;
          padding:2px 6px">${it.n}</span>`).join('')}
      </div>` : ''

    const reviewNote = s.status !== 'pending'
      ? `<div style="margin-top:6px;font-size:11px;color:var(--muted)">
           Revisore: ${s.reviewer?.full_name || '—'} · ${s.review_note ? 'Note: ' + s.review_note : ''}
         </div>` : ''

    const actions = s.status === 'pending' ? `
      <div style="margin-top:8px">
        <input type="text" id="note-${s.id}" placeholder="Nota opzionale (visibile al collaboratore)" style="margin-bottom:6px">
        <div class="sug-card-actions">
          <button class="btn btn-success btn-sm" onclick="reviewSuggestion('${s.id}','approved')">Approva</button>
          <button class="btn btn-danger btn-sm" onclick="reviewSuggestion('${s.id}','rejected')">Rifiuta</button>
        </div>
      </div>` : `<span class="status-badge status-${s.status}" style="margin-top:6px;display:inline-block">${s.status}</span>`

    return `<div class="sug-card">
      <div class="sug-card-header">
        <div>
          <div class="sug-card-cell">${cellLabel}</div>
          <div class="sug-card-type">${typeLabels[s.suggestion_type] || s.suggestion_type}</div>
        </div>
        <div style="text-align:right">
          <div class="sug-card-by">${s.submitter?.full_name || s.submitter?.email || '—'}</div>
          <div style="font-size:10px;color:var(--muted)">${date}</div>
        </div>
      </div>
      <div class="sug-card-content">
        ${contentHtml}
        ${cellPreview}
      </div>
      ${reviewNote}
      ${actions}
    </div>`
  }).join('')

  document.getElementById('suggestions-list').innerHTML = html
}

async function reviewSuggestion(sugId, status) {
  const sug = allSuggestions.find(s => s.id === sugId)
  if (!sug) return

  const note = document.getElementById('note-' + sugId)?.value?.trim() || null
  const { data: { user } } = await sb.auth.getUser()

  const updateData = { status, review_note: note, reviewed_by: user.id,
                       reviewed_at: new Date().toISOString() }

  // If approving, update the matrix cell
  if (status === 'approved') {
    const cell = cells[sug.cell_id]
    if (!cell) return toast('Cella non trovata.', 'error')

    if (sug.suggestion_type === 'add_item') {
      const newItems = [...cell.items, { n: sug.content.name, d: sug.content.description || '' }]
      await sb.from('matrix_cells').update({ items: newItems, updated_at: new Date().toISOString(),
        updated_by: user.id }).eq('id', sug.cell_id)
      cells[sug.cell_id].items = newItems

    } else if (sug.suggestion_type === 'edit_item') {
      const idx = sug.content.item_index
      const newItems = cell.items.map((it, i) => {
        if (i !== idx) return it
        return {
          n: sug.content.new_name  || it.n,
          d: sug.content.new_desc  !== null && sug.content.new_desc !== undefined
             ? (sug.content.new_desc || it.d)
             : it.d
        }
      })
      await sb.from('matrix_cells').update({ items: newItems, updated_at: new Date().toISOString(),
        updated_by: user.id }).eq('id', sug.cell_id)
      cells[sug.cell_id].items = newItems

    } else if (sug.suggestion_type === 'delete_item') {
      const idx = sug.content.item_index
      const newItems = cell.items.filter((_, i) => i !== idx)
      await sb.from('matrix_cells').update({ items: newItems, updated_at: new Date().toISOString(),
        updated_by: user.id }).eq('id', sug.cell_id)
      cells[sug.cell_id].items = newItems

    } else if (sug.suggestion_type === 'change_coverage') {
      await sb.from('matrix_cells').update({ coverage: sug.content.new_coverage,
        updated_at: new Date().toISOString(), updated_by: user.id }).eq('id', sug.cell_id)
      cells[sug.cell_id].coverage = sug.content.new_coverage

    } else if (sug.suggestion_type === 'change_label') {
      await sb.from('matrix_cells').update({ label: sug.content.new_label,
        updated_at: new Date().toISOString(), updated_by: user.id }).eq('id', sug.cell_id)
      cells[sug.cell_id].label = sug.content.new_label
    }
  }

  const { error } = await sb.from('suggestions').update(updateData).eq('id', sugId)
  if (error) return toast('Errore: ' + error.message, 'error')

  // Update local state
  const idx = allSuggestions.findIndex(s => s.id === sugId)
  if (idx !== -1) { allSuggestions[idx] = { ...allSuggestions[idx], ...updateData } }

  const pending = allSuggestions.filter(s => s.status === 'pending').length
  document.getElementById('stat-pending').textContent = pending
  document.getElementById('pending-badge').textContent = pending > 0 ? ` (${pending})` : ''

  renderSuggestions()
  toast(status === 'approved' ? 'Suggerimento approvato e matrice aggiornata!' : 'Suggerimento rifiutato.', 'success')
}

// ── Users ─────────────────────────────────────────────────────

function renderUsers(users) {
  if (users.length === 0) {
    document.getElementById('users-list').innerHTML = '<p style="color:var(--muted);font-size:13px">Nessun utente registrato.</p>'
    return
  }
  const rows = users.map(u => `<tr>
    <td>${u.full_name || '—'}</td>
    <td style="color:var(--muted)">${u.email}</td>
    <td>${new Date(u.created_at).toLocaleDateString('it-IT')}</td>
    <td>
      <select class="role-select" onchange="changeRole('${u.id}', this.value)">
        <option value="viewer"      ${u.role==='viewer'?'selected':''}>viewer</option>
        <option value="contributor" ${u.role==='contributor'?'selected':''}>contributor</option>
        <option value="admin"       ${u.role==='admin'?'selected':''}>admin</option>
      </select>
    </td>
  </tr>`).join('')

  document.getElementById('users-list').innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">
      <table class="users-table">
        <thead><tr><th>Nome</th><th>Email</th><th>Registrato</th><th>Ruolo</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">
      viewer = solo lettura · contributor = può suggerire · admin = approva e modifica
    </p>`
}

async function changeRole(userId, newRole) {
  const { error } = await sb.from('profiles').update({ role: newRole }).eq('id', userId)
  if (error) return toast('Errore cambio ruolo: ' + error.message, 'error')
  toast(`Ruolo aggiornato a "${newRole}"`, 'success')
}

// ── Direct cell editor ────────────────────────────────────────

function renderAdminMatrix() {
  let head = '<tr><th class="sector-th">Settore</th>'
  ACTIVITIES.forEach(a => head += `<th>${a}</th>`)
  head += '</tr>'
  document.getElementById('admin-matrix-head').innerHTML = head

  let body = ''
  SECTORS.forEach(s => {
    body += `<tr><th class="sector-th" style="color:${s.color}">${s.label}</th>`
    for (let i = 0; i < 5; i++) {
      const id = `${s.id}-${i}`
      const cell = cells[id]
      if (!cell) { body += '<td></td>'; continue }
      body += `<td>
        <div class="matrix-cell" style="background:${s.bg}" onclick="openEditor('${id}')">
          <div class="cell-label" style="color:${s.color}">${cell.label}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px">${cell.items.length} voci · ${COV_LABELS[cell.coverage]}</div>
          <div style="font-size:10px;color:var(--red);margin-top:3px">✎ modifica</div>
        </div>
      </td>`
    }
    body += '</tr>'
  })
  document.getElementById('admin-matrix-body').innerHTML = body
}

function openEditor(cellId) {
  editingCellId = cellId
  const cell = cells[cellId]
  const sector = SECTORS.find(s => cellId.startsWith(s.id))
  const actIdx = parseInt(cellId.split('-')[1])

  document.getElementById('editor-title').textContent =
    `Modifica: ${sector.label} × ${ACTIVITIES[actIdx]}`
  document.getElementById('editor-cov').value = cell.coverage
  document.getElementById('editor-label').value = cell.label
  document.getElementById('editor-items').value =
    cell.items.map(it => `${it.n} | ${it.d}`).join('\n')

  document.getElementById('cell-editor').style.display = 'block'
  document.getElementById('cell-editor').scrollIntoView({ behavior:'smooth', block:'start' })
}

function closeEditor() {
  document.getElementById('cell-editor').style.display = 'none'
  editingCellId = null
}

async function saveCell() {
  if (!editingCellId) return
  const { data: { user } } = await sb.auth.getUser()

  const cov   = document.getElementById('editor-cov').value
  const label = document.getElementById('editor-label').value.trim()
  const raw   = document.getElementById('editor-items').value.trim()

  if (!label) return toast('Il titolo non può essere vuoto.', 'error')

  const items = raw.split('\n')
    .map(l => l.trim()).filter(Boolean)
    .map(l => {
      const [n, ...rest] = l.split('|')
      return { n: n.trim(), d: rest.join('|').trim() }
    })

  const { error } = await sb.from('matrix_cells').update({
    coverage: cov, label, items,
    updated_at: new Date().toISOString(), updated_by: user.id
  }).eq('id', editingCellId)

  if (error) return toast('Errore: ' + error.message, 'error')

  cells[editingCellId] = { ...cells[editingCellId], coverage: cov, label, items }
  renderAdminMatrix()
  closeEditor()
  toast('Cella aggiornata!', 'success')
}

// ── Audit Log ─────────────────────────────────────────────────

let logFilter = 'all'
let logOffset = 0
const LOG_PAGE = 50

const ACTION_LABELS = {
  cell_updated:          'Cella modificata',
  suggestion_submitted:  'Suggerimento inviato',
  suggestion_approved:   'Suggerimento approvato',
  suggestion_rejected:   'Suggerimento rifiutato',
  role_changed:          'Ruolo cambiato',
  rollback:              'Rollback',
  user_login:            'Accesso',
}
const ACTION_COLORS = {
  cell_updated:          '#185FA5',
  suggestion_submitted:  '#854F0B',
  suggestion_approved:   '#3B6D11',
  suggestion_rejected:   '#A32D2D',
  role_changed:          '#3C3489',
  rollback:              '#555',
  user_login:            '#888',
}

// Campi su cui il rollback è supportato
const ROLLBACKABLE_ACTIONS = ['cell_updated', 'role_changed', 'suggestion_approved']
const ROLLBACKABLE_FIELDS  = ['label', 'coverage', 'items', 'role']

async function loadLog(reset = true) {
  if (reset) logOffset = 0

  let query = sb.from('audit_log')
    .select('*')
    .order('ts', { ascending: false })
    .range(logOffset, logOffset + LOG_PAGE - 1)

  if (logFilter !== 'all') query = query.eq('action', logFilter)

  const { data, error } = await query
  if (error) return toast('Errore log: ' + error.message, 'error')

  if (reset) renderLog(data || [], false)
  else       renderLog(data || [], true)

  document.getElementById('log-load-more').classList.toggle(
    'hidden', !data || data.length < LOG_PAGE
  )

  // Barra dimensione
  const { data: sizeBytes } = await sb.rpc('get_log_size')
  if (sizeBytes != null) {
    const mb  = (sizeBytes / (1024*1024)).toFixed(2)
    const pct = Math.min(100, Math.round(sizeBytes / (50*1024*1024) * 100))
    const col = pct > 80 ? '#A32D2D' : pct > 50 ? '#854F0B' : '#3B6D11'
    document.getElementById('log-size-badge').innerHTML =
      `Dimensione log: <strong style="color:${col}">${mb} MB</strong> / 50 MB
       <span style="display:inline-block;width:80px;height:6px;background:#eee;
                    border-radius:3px;margin-left:6px;vertical-align:middle">
         <span style="display:block;width:${pct}%;height:100%;background:${col};border-radius:3px"></span>
       </span>`
  }
}

function renderLog(entries, append) {
  const container = document.getElementById('log-list')

  if (entries.length === 0 && !append) {
    container.innerHTML = '<p style="color:var(--muted);font-size:13px">Nessuna attività registrata.</p>'
    return
  }

  const rows = entries.map(e => {
    const color = ACTION_COLORS[e.action] || '#555'
    const label = ACTION_LABELS[e.action] || e.action
    const date  = new Date(e.ts).toLocaleString('it-IT')
    const detailHtml = buildDetailHtml(e)
    const detailId = `log-detail-${e.id}`

    return `<tr>
      <td style="color:var(--muted);font-size:11px;white-space:nowrap;vertical-align:top">${date}</td>
      <td style="font-size:12px;vertical-align:top">${e.actor_email || '—'}</td>
      <td style="vertical-align:top">
        <span style="font-size:11px;font-weight:600;color:${color};
                     background:${color}18;padding:2px 8px;border-radius:20px">
          ${label}
        </span>
      </td>
      <td style="font-size:11px;color:var(--muted);vertical-align:top">
        ${e.target_type || ''} ${e.target_id ? '· ' + e.target_id : ''}
      </td>
      <td style="vertical-align:top">
        <button class="btn btn-secondary btn-sm"
                onclick="toggleDetail('${detailId}')">
          Dettaglio
        </button>
      </td>
    </tr>
    <tr id="${detailId}" style="display:none">
      <td colspan="5" style="padding:0 0 12px 0">
        <div style="background:#fafafa;border:1px solid var(--border);
                    border-radius:var(--radius);padding:12px 16px;margin:4px 0 0 0">
          ${detailHtml}
        </div>
      </td>
    </tr>`
  }).join('')

  const tableHtml = `
    <div class="card" style="padding:0;overflow:hidden">
      <table class="sug-table" style="table-layout:auto">
        <thead>
          <tr>
            <th>Data/ora</th>
            <th>Utente</th>
            <th>Azione</th>
            <th>Target</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="log-tbody">${rows}</tbody>
      </table>
    </div>`

  if (append) {
    const tbody = document.getElementById('log-tbody')
    if (tbody) { tbody.insertAdjacentHTML('beforeend', rows); return }
  }
  container.innerHTML = tableHtml
}

function toggleDetail(id) {
  const row = document.getElementById(id)
  if (!row) return
  row.style.display = row.style.display === 'none' ? 'table-row' : 'none'
}

function buildDetailHtml(e) {
  const d = e.detail || {}

  // Rollback entry
  if (e.action === 'rollback') {
    return `
      <div style="font-size:12px;margin-bottom:8px">
        <strong>Rollback del log #${d.original_log_id}</strong>
        · azione originale: <em>${ACTION_LABELS[d.original_action] || d.original_action}</em>
        · su: <em>${d.original_actor}</em>
      </div>
      <table style="font-size:12px;border-collapse:collapse;width:100%">
        <tr style="background:#f0f0f0">
          <th style="text-align:left;padding:5px 10px;font-weight:500">Campo</th>
          <th style="text-align:left;padding:5px 10px;font-weight:500;color:#3B6D11">Valore ripristinato</th>
        </tr>
        <tr>
          <td style="padding:6px 10px">${d.field || 'intera cella'}</td>
          <td style="padding:6px 10px;color:#3B6D11">
            ${formatFieldValue(d.field || 'items', d.restored_to)}
          </td>
        </tr>
      </table>`
  }

  // suggestion_approved: rollback speciale che ripristina intera cella
  if (e.action === 'suggestion_approved') {
    const stype   = d.suggestion_type || ''
    const content = d.suggestion_content || {}
    const hasBefore = !!d.cell_snapshot_before
    const typeLabel = { add_item:'Aggiunta voce', change_coverage:'Cambio copertura',
                        change_label:'Cambio titolo', general_note:'Nota' }[stype] || stype
    let contentDesc = ''
    if (stype === 'add_item')
      contentDesc = `<strong>${content.name || ''}</strong>${content.description ? ' — ' + content.description : ''}`
    else if (stype === 'edit_item')
      contentDesc = `"${content.current_name}" → <strong>${content.new_name || content.current_name}</strong>
                     ${content.new_desc ? ' / ' + content.new_desc : ''}
                     ${content.reason ? '<br><em>' + content.reason + '</em>' : ''}`
    else if (stype === 'delete_item')
      contentDesc = `Elimina: <strong>"${content.current_name}"</strong>
                     ${content.reason ? '<br><em>' + content.reason + '</em>' : ''}`
    else if (stype === 'change_coverage')
      contentDesc = `Nuova copertura: <strong>${content.new_coverage || ''}</strong> · ${content.reason || ''}`
    else if (stype === 'change_label')
      contentDesc = `Nuovo titolo: <strong>${content.new_label || ''}</strong>`
    else if (stype === 'general_note')
      contentDesc = content.note || ''

    return `
      <table style="font-size:12px;border-collapse:collapse;width:100%;margin-bottom:12px">
        <tr style="background:#f0f0f0">
          <th style="text-align:left;padding:5px 10px;font-weight:500">Tipo</th>
          <th style="text-align:left;padding:5px 10px;font-weight:500">Contenuto approvato</th>
          <th style="text-align:left;padding:5px 10px;font-weight:500">Cella</th>
        </tr>
        <tr>
          <td style="padding:6px 10px">${typeLabel}</td>
          <td style="padding:6px 10px;color:#3B6D11">${contentDesc}</td>
          <td style="padding:6px 10px;color:var(--muted)">${d.cell_id || '—'}</td>
        </tr>
      </table>
      ${hasBefore
        ? `<button class="btn btn-danger btn-sm"
             onclick="confirmApprovalRollback(${e.id})">
             ↩ Annulla approvazione e ripristina cella
           </button>
           <span style="font-size:11px;color:var(--muted);margin-left:8px">
             Ripristina la cella allo stato precedente e segna il suggerimento come "reverted"
           </span>`
        : `<span style="font-size:11px;color:#ccc">
             Rollback non disponibile — approvato prima dell'aggiornamento al log v3
           </span>`
      }`
  }

  // Entry con diff (cell_updated, role_changed, ecc.)
  const diff = d.diff
  if (!diff || !Array.isArray(diff) || diff.length === 0) {
    return `<pre style="font-size:11px;color:var(--muted);white-space:pre-wrap">${JSON.stringify(d, null, 2)}</pre>`
  }

  const canRollback = ROLLBACKABLE_ACTIONS.includes(e.action)

  const rows = diff.map(item => {
    const field    = item.field || '—'
    const oldVal   = formatFieldValue(field, item.old)
    const newVal   = formatFieldValue(field, item.new)
    const canField = canRollback && ROLLBACKABLE_FIELDS.includes(field)

    return `<tr>
      <td style="padding:6px 10px;border-bottom:1px solid #eee;font-weight:500">${field}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #eee;color:#A32D2D;
                 max-width:200px;word-break:break-word">${oldVal}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #eee;color:#3B6D11;
                 max-width:200px;word-break:break-word">${newVal}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #eee">
        ${canField
          ? `<button class="btn btn-secondary btn-sm"
               onclick="confirmRollback(${e.id}, '${field}', '${escapeHtml(oldVal)}')"
               title="Ripristina '${field}' al valore precedente">
               ↩ Ripristina
             </button>`
          : '<span style="font-size:11px;color:#ccc">—</span>'}
      </td>
    </tr>`
  }).join('')

  return `
    <table style="font-size:12px;border-collapse:collapse;width:100%">
      <tr style="background:#f0f0f0">
        <th style="text-align:left;padding:5px 10px;font-weight:500;min-width:90px">Campo</th>
        <th style="text-align:left;padding:5px 10px;font-weight:500;color:#A32D2D">Valore precedente</th>
        <th style="text-align:left;padding:5px 10px;font-weight:500;color:#3B6D11">Valore nuovo</th>
        <th style="padding:5px 10px;min-width:120px"></th>
      </tr>
      ${rows}
    </table>`
}

function formatFieldValue(field, val) {
  if (val === null || val === undefined) return '<em style="color:#ccc">—</em>'
  if (field === 'items') {
    if (Array.isArray(val)) return `${val.length} voci`
    try {
      const arr = typeof val === 'string' ? JSON.parse(val) : val
      return Array.isArray(arr) ? `${arr.length} voci` : String(val)
    } catch { return String(val) }
  }
  if (typeof val === 'object') return JSON.stringify(val)
  return String(val)
}

function escapeHtml(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;')
}

async function confirmApprovalRollback(logId) {
  const ok = confirm(
    'Sei sicuro di voler annullare questa approvazione?\n\n' +
    'La cella verrà ripristinata allo stato precedente.\n' +
    'Il suggerimento verrà marcato come "reverted".\n' +
    'L\'operazione verrà registrata nel log.'
  )
  if (!ok) return

  const { data: { user } } = await sb.auth.getUser()

  const { data, error } = await sb.rpc('rollback_audit_entry', {
    p_log_id:   logId,
    p_field:    'approval',
    p_actor_id: user.id
  })

  if (error) return toast('Errore rollback: ' + error.message, 'error')
  if (!data?.ok) return toast('Rollback fallito: ' + (data?.error || 'errore sconosciuto'), 'error')

  toast('Approvazione annullata. Cella ripristinata e log aggiornato.', 'success')
  loadLog(true)
}

async function confirmRollback(logId, field, oldValDisplay) {
  const ok = confirm(
    `Sei sicuro di voler ripristinare il campo "${field}" al valore precedente?\n\n` +
    `Valore che verrà ripristinato: ${oldValDisplay}\n\n` +
    `Questa operazione verrà registrata nel log.`
  )
  if (!ok) return

  const { data: { user } } = await sb.auth.getUser()

  const { data, error } = await sb.rpc('rollback_audit_entry', {
    p_log_id:   logId,
    p_field:    field,
    p_actor_id: user.id
  })

  if (error) return toast('Errore rollback: ' + error.message, 'error')
  if (!data?.ok) return toast('Rollback fallito: ' + (data?.error || 'errore sconosciuto'), 'error')

  toast(`Campo "${field}" ripristinato con successo. Rollback registrato nel log.`, 'success')
  loadLog(true)
}

function filterLog(f) {
  logFilter = f
  loadLog(true)
}

async function loadMoreLog() {
  logOffset += LOG_PAGE
  loadLog(false)
}

// ── Utils ─────────────────────────────────────────────────────

function toast(msg, type='success') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast ' + type
  setTimeout(() => el.className = 'toast hidden', 3500)
}

async function logout() {
  await sb.auth.signOut()
  window.location.href = 'index.html'
}

init()
</script>
</body>
</html>
